
<!-- CSS Crítico Inline (Above the Fold) -->
<style id="critical-css">
 *,*::before,*::after{box-sizing:border-box}html{font-family:'DM Sans',sans-serif;line-height:1.15;-webkit-text-size-adjust:100%}body{margin:0;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:1rem;font-weight:400;line-height:1.5;color:#212529;background-color:#fff}.no-js{visibility:hidden}.boxcar-container{width:100%;padding-right:15px;padding-left:15px;margin-right:auto;margin-left:auto}@media (min-width:576px){.boxcar-container{max-width:540px}}@media (min-width:768px){.boxcar-container{max-width:720px}}@media (min-width:992px){.boxcar-container{max-width:960px}}@media (min-width:1200px){.boxcar-container{max-width:1140px}}@media (min-width:1400px){.boxcar-container{max-width:1320px}}
</style>
