<!-- ⚡ JavaScript Crítico Inline --> <script> window.ATRIA_LOADING = { hero: false, cars: false, search: false }; if ('IntersectionObserver' in window) { window.ATRIA_OBSERVER = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { const element = entry.target; if (element.dataset.src) { element.src = element.dataset.src; element.removeAttribute('data-src')} if (element.dataset.lazy === 'true') { element.classList.add('lazy-loaded')} window.ATRIA_OBSERVER.unobserve(element)} })}, { rootMargin: '50px 0px', threshold: 0.1 })} window.ATRIA_TOUCH = { startX: 0, startY: 0, isScrolling: undefined, handleTouchStart: function(e) { this.startX = e.touches[0].pageX; this.startY = e.touches[0].pageY; this.isScrolling = undefined}, handleTouchMove: function(e) { if (e.touches.length > 1 || e.scale && e.scale !== 1) return; const currentX = e.touches[0].pageX; const currentY = e.touches[0].pageY; if (this.isScrolling === undefined) { this.isScrolling = Math.abs(currentY - this.startY) > Math.abs(currentX - this.startX)} if (!this.isScrolling) { e.preventDefault(); const carousel = e.currentTarget.closest('.car-slider-three'); if (carousel && carousel.slick) { const deltaX = currentX - this.startX; if (Math.abs(deltaX) > 50) { if (deltaX > 0) { carousel.slick.slickPrev()} else { carousel.slick.slickNext()} this.startX = currentX} } } } }; window.ATRIA_PRELOAD = { fonts: ['DM Sans:400,700', 'Font Awesome 6 Free:900'], critical: [ '/css/bootstrap.min.css', '/css/style.css' ], loadFonts: function() { this.fonts.forEach(font => { const link = document.createElement('link'); link.rel = 'preload'; link.as = 'font'; link.type = 'font/woff2'; link.crossOrigin = 'anonymous'; link.href = 'https: document.head.appendChild(link)})}, loadCSS: function(href) { const link = document.createElement('link'); link.rel = 'stylesheet'; link.href = href; link.media = 'print'; link.onload = () => link.media = 'all'; document.head.appendChild(link)} }; window.ATRIA_PERF = { marks: {}, mark: function(name) { this.marks[name] = performance.now(); if (window.console && window.console.log) { console.log('⚡ ' + name + ': ' + this.marks[name].toFixed(2) + 'ms')} }, measure: function(name, start) { const duration = performance.now() - (this.marks[start] || 0); if (window.console && window.console.log) { console.log('📊 ' + name + ': ' + duration.toFixed(2) + 'ms')} return duration} }; window.addEventListener('error', function(e) { if (window.console && window.console.warn) { console.warn('⚠️ Erro capturado:', e.message)} }); document.addEventListener('DOMContentLoaded', function() { window.ATRIA_PERF.mark('DOMContentLoaded'); window.ATRIA_PRELOAD.loadFonts(); document.querySelectorAll('[data-lazy="true"], [data-src]').forEach(el => { if (window.ATRIA_OBSERVER) { window.ATRIA_OBSERVER.observe(el)} }); document.querySelectorAll('.car-slider-three').forEach(carousel => { carousel.addEventListener('touchstart', window.ATRIA_TOUCH.handleTouchStart.bind(window.ATRIA_TOUCH), { passive: false }); carousel.addEventListener('touchmove', window.ATRIA_TOUCH.handleTouchMove.bind(window.ATRIA_TOUCH), { passive: false })})}); window.addEventListener('load', function() { window.ATRIA_PERF.measure('Total Load Time', 'DOMContentLoaded'); document.body.classList.add('loaded'); setTimeout(() => { const preloadPages = ['/estoque', '/sobre', '/contato']; preloadPages.forEach(page => { const link = document.createElement('link'); link.rel = 'prefetch'; link.href = page; document.head.appendChild(link)})}, 2000)}); </script>
